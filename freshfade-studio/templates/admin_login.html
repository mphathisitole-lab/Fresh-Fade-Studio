{% extends "base.html" %}
{% block title %}Admin Login — FreshFade Studio{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-container">
        <h2>Admin Login</h2>
        <p class="form-subtitle">Barber / Staff access only</p>

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Admin username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Admin password">
            </div>
            <button type="submit" class="btn btn-gold" style="width:100%;margin-top:0.5rem;">
                Log In as Admin
            </button>
        </form>

        <div class="form-footer">
            <a href="{{ url_for('index') }}">&larr; Back to site</a>
        </div>
    </div>
</div>
{% endblock %}
