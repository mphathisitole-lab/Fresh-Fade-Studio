{% extends "base.html" %}
{% block title %}Reset Password — FreshFade Studio{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-container">
        <h2>Set New Password</h2>
        <p class="form-subtitle">Choose a strong new password</p>

        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="form-group">
                <label>New Password *</label>
                <div style="display:flex;gap:0.5rem;">
                    <input type="password" name="password" id="password-input" required
                           minlength="8" placeholder="Min 8 chars, upper, lower, digit, special"
                           style="flex:1;" oninput="checkStr(this.value)">
                    <button type="button" class="btn btn-outline btn-sm" onclick="suggest()"
                            style="white-space:nowrap;">Suggest</button>
                </div>
                <div style="height:4px;border-radius:2px;margin-top:0.5rem;background:var(--border);overflow:hidden;">
                    <div id="pw-fill" style="height:100%;width:0%;transition:all 0.3s;border-radius:2px;"></div>
                </div>
                <p id="pw-text" style="font-size:0.75rem;margin-top:0.3rem;color:var(--text-muted);">
                    8+ chars, uppercase, lowercase, digit, special character
                </p>
            </div>
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" name="confirm_password" required minlength="8" placeholder="Repeat password">
            </div>
            <button type="submit" class="btn btn-gold" style="width:100%;margin-top:0.5rem;">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function checkStr(pw) {
    let s=0;
    if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/[a-z]/.test(pw))s++;
    if(/\d/.test(pw))s++;if(/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw))s++;
    const f=document.getElementById("pw-fill"),t=document.getElementById("pw-text");
    f.style.width=(s/5*100)+"%";
    if(s<=2){f.style.background="var(--accent-red)";t.textContent="Weak";t.style.color="var(--accent-red)";}
    else if(s<=3){f.style.background="var(--gold)";t.textContent="Fair";t.style.color="var(--gold)";}
    else if(s===4){f.style.background="var(--gold-light)";t.textContent="Good";t.style.color="var(--gold-light)";}
    else{f.style.background="var(--accent-green)";t.textContent="Strong ✓";t.style.color="var(--accent-green)";}
}
async function suggest(){
    try{const r=await fetch("/api/suggest-password"),d=await r.json(),i=document.getElementById("password-input");
    i.type="text";i.value=d.password;checkStr(d.password);navigator.clipboard.writeText(d.password).catch(()=>{});
    document.getElementById("pw-text").textContent="Suggested & copied!";
    setTimeout(()=>{i.type="password";},4000);}catch(e){console.error(e);}
}
</script>
{% endblock %}
