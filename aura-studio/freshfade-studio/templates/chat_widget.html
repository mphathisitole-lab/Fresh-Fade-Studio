<!-- Floating chat button -->
<div id="chat-fab" onclick="toggleChat()" title="Chat with us">
    💬
    <span id="chat-badge" style="display:none;"></span>
</div>

<!-- Chat box -->
<div id="chat-box" style="display:none;">
    <div id="chat-header">
        <div>
            <strong>✂ Aura Studio.co</strong>
            <span style="font-size:0.75rem;color:var(--text-muted);display:block;">Enquiry Chat</span>
        </div>
        <button onclick="toggleChat()" style="background:none;border:none;color:var(--text-primary);font-size:1.3rem;cursor:pointer;">&times;</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type your message..."
               onkeydown="if(event.key==='Enter')sendMessage();">
        <button onclick="sendMessage()" id="chat-send-btn">➤</button>
    </div>
</div>

<style>
#chat-fab {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--bg-dark);
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,168,76,0.4);
    z-index: 2000;
    transition: all 0.3s;
}
#chat-fab:hover { transform: scale(1.1); }
#chat-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--accent-red);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
}
#chat-box {
    position: fixed;
    bottom: 90px;
    right: 25px;
    width: 360px;
    max-width: calc(100vw - 40px);
    height: 480px;
    max-height: calc(100vh - 120px);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    z-index: 2001;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#chat-header {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-dark);
}
#chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}
.chat-msg {
    max-width: 85%;
    padding: 0.6rem 0.9rem;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.4;
    word-wrap: break-word;
}
.chat-msg.user {
    align-self: flex-end;
    background: var(--gold);
    color: var(--bg-dark);
    border-bottom-right-radius: 4px;
}
.chat-msg.admin {
    align-self: flex-start;
    background: var(--bg-input);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
}
.chat-msg .chat-time {
    font-size: 0.65rem;
    opacity: 0.6;
    margin-top: 0.2rem;
}
.chat-msg.user .chat-time { text-align: right; }
.chat-date-divider {
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin: 0.5rem 0;
}
#chat-input-area {
    display: flex;
    padding: 0.6rem;
    border-top: 1px solid var(--border);
    background: var(--bg-dark);
    gap: 0.4rem;
}
#chat-input {
    flex: 1;
    padding: 0.6rem 0.8rem;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
}
#chat-input:focus { border-color: var(--gold); }
#chat-send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--bg-dark);
    border: none;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
}
#chat-send-btn:hover { background: var(--gold-light); }
</style>

<script>
let chatOpen = false;
let lastMsgId = 0;

function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById("chat-box").style.display = chatOpen ? "flex" : "none";
    if (chatOpen) loadChatMessages();
}

async function loadChatMessages() {
    try {
        const res = await fetch("/api/chat/messages");
        const data = await res.json();
        const container = document.getElementById("chat-messages");
        container.innerHTML = "";
        let lastDate = "";
        data.messages.forEach(m => {
            if (m.date !== lastDate) {
                lastDate = m.date;
                const divider = document.createElement("div");
                divider.className = "chat-date-divider";
                divider.textContent = m.date;
                container.appendChild(divider);
            }
            const div = document.createElement("div");
            div.className = `chat-msg ${m.sender}`;
            div.innerHTML = `${escapeHtml(m.message)}<div class="chat-time">${m.time}</div>`;
            container.appendChild(div);
            lastMsgId = m.id;
        });
        container.scrollTop = container.scrollHeight;
        // Clear badge
        const badge = document.getElementById("chat-badge");
        badge.style.display = "none";
    } catch (e) { console.error("Chat load error:", e); }
}

async function sendMessage() {
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    try {
        await fetch("/api/chat/send", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text}),
        });
        loadChatMessages();
    } catch (e) { console.error("Chat send error:", e); }
}

async function checkUnread() {
    try {
        const res = await fetch("/api/chat/unread-count");
        const data = await res.json();
        const badge = document.getElementById("chat-badge");
        if (data.count > 0 && !chatOpen) {
            badge.textContent = data.count;
            badge.style.display = "flex";
        } else {
            badge.style.display = "none";
        }
        // If chat is open, refresh messages
        if (chatOpen) loadChatMessages();
    } catch (e) {}
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

// Poll for new messages every 5 seconds
setInterval(checkUnread, 5000);
// Initial check
checkUnread();
</script>
