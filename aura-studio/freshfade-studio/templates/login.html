{% extends "base.html" %}
{% block title %}Login — Aura Studio.co{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-container">
        <h2>Welcome Back</h2>
        <p class="form-subtitle">Log in to manage your bookings</p>

        <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Your password">
            </div>
            <div style="text-align:right;margin-bottom:1rem;">
                <a href="{{ url_for('forgot_password') }}"
                   style="font-size:0.85rem;color:var(--gold);">Forgot your password?</a>
            </div>
            <button type="submit" class="btn btn-gold" style="width:100%;">
                Log In
            </button>
        </form>

        <div class="form-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a>
        </div>
    </div>
</div>
{% endblock %}
