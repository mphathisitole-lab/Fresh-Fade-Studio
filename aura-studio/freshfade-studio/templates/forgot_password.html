{% extends "base.html" %}
{% block title %}Forgot Password — Aura Studio.co{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-container">
        <h2>Forgot Password?</h2>
        <p class="form-subtitle">Enter your email and we'll send you a reset link</p>

        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="your@email.com">
            </div>
            <button type="submit" class="btn btn-gold" style="width:100%;margin-top:0.5rem;">
                Send Reset Link
            </button>
        </form>

        <div class="form-footer" style="margin-top:1.5rem;">
            <a href="{{ url_for('login') }}">&larr; Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
