{% extends "base.html" %}
{% block title %}Create Admin Account — Aura Studio.co{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-container">
        <h2>Create Admin Account</h2>

        <form method="POST" action="{{ url_for('admin_register') }}">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="Enter admin email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Choose a strong password">
            </div>
            <button type="submit" class="btn btn-gold" style="width:100%;margin-top:0.5rem;">
                Create Admin Account
            </button>
        </form>

        <div class="form-footer">
            <a href="{{ url_for('admin_login') }}">&larr; Back to Admin Login</a>
        </div>
    </div>
</div>
{% endblock %}
